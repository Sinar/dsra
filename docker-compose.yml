services:
  viewfinder:
    build:
      context: .
    image: sinarproj-dsra:latest
    container_name: sinarproj-dsra
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - MAILER_DSN=${MAILER_DSN}
      - MAILER_TO=${MAILER_TO}
      - MAILER_FROM=${MAILER_FROM}
      - BASE_URL=${BASE_URL}
      - GPG_KEY_ID=${GPG_KEY_ID}
      - DATA_DIR=${DATA_DIR:-/opt/app-root/src/data}
    volumes:
      - ./data:/opt/app-root/src/data
      - gpg-keys:/opt/app-root/src/.gnupg

volumes:
  gpg-keys:
